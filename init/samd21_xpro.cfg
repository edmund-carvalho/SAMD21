# Step 1: Initialize the driver engine
adapter driver cmsis-dap

# Step 2: Use the native Windows HID system calls
cmsis-dap backend hid

# Step 3: Match the explicit hardware profile of your board 
cmsis-dap vid_pid 0x03eb 0x2169

# Step 4: Manually force OpenOCD to grab Interface 0 out of the composite pool
cmsis-dap usb interface 0

# Step 5: Configure the core transport protocol
transport select swd

# Step 6: Target configuration details
set CHIPNAME at91samd21j18a

# Instead of relying on full target automation scripts, we build the TAP explicitly
swd newdap $CHIPNAME cpu -expected-id 0x0bc11477